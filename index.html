<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuoteFlow</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/quoteflow-logo.png" alt="QuoteFlow ロゴ">
      </div>
      <nav class="nav">
        <button data-page="top" class="active">TOP</button>
        <button data-action="new">新規作成</button>
        <button data-page="search">見積検索</button>
        <button data-page="ledger">見積番号台帳</button>
        <button data-page="master">マスタ</button>
        <button data-page="settings">設定</button>
      </nav>
      <div class="workspace-card">
        <div class="avatar">Q</div>
        <div><strong>QuoteFlow</strong><small>OAリース見積管理</small></div>
      </div>
    </aside>
    <main class="main">
      <div id="notice" class="notice" hidden></div>
      <div id="view"></div>
    </main>
  </div>
  <div id="printArea" class="print-area"></div>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="src/app.js"></script>
</body>
</html>
